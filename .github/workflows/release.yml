# Builds the Sequora wallet for Linux, macOS (Intel + Apple Silicon) and Windows
# on a version tag (e.g. `git tag v0.1.0 && git push --tags`), and attaches the
# binaries + SHA-256 checksums to a GitHub Release. Each OS builds natively, so
# there is no cross-compilation. (Pin actions to commit SHAs before any real release.)
name: release
on:
  push:
    tags: ['v*']
permissions:
  contents: write
jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            name: sqrwallet-linux-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            name: sqrwallet-macos-arm64
          - os: macos-13
            target: x86_64-apple-darwin
            name: sqrwallet-macos-x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            name: sqrwallet-windows-x86_64.exe
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: build
        run: cargo build --release --locked --target ${{ matrix.target }}
      - name: package + checksum
        shell: bash
        run: |
          src="target/${{ matrix.target }}/release/sqrwallet"
          [ -f "$src.exe" ] && src="$src.exe"
          cp "$src" "${{ matrix.name }}"
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "${{ matrix.name }}" > "${{ matrix.name }}.sha256"
          else
            shasum -a 256 "${{ matrix.name }}" > "${{ matrix.name }}.sha256"
          fi
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ matrix.name }}
            ${{ matrix.name }}.sha256
